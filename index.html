<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0f0a;--bg2:#131a13;--bg3:#1a241a;--bg4:#223322;
--green:#2d6a4f;--green-light:#40916c;--green-bright:#52b788;--green-dim:#1b4332;
--text:#e8e8e8;--text2:#a0a0a0;--text3:#606060;
--red:#e74c3c;--yellow:#f1c40f;--blue:#3498db;
--radius:12px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;touch-action:manipulation}
input,select,textarea,button{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none;color:var(--text)}
input,select{background:var(--bg3);border:1px solid var(--bg4);color:var(--text);border-radius:var(--radius-sm);padding:10px 12px;font-size:16px;width:100%}
input:focus,select:focus{outline:none;border-color:var(--green-light)}
input[type="number"]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.header{padding:16px 20px 12px;background:var(--bg);border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;min-height:56px;padding-top:env(safe-area-inset-top,16px)}
.header h1{font-size:20px;font-weight:700}
.header-btn{font-size:14px;color:var(--green-bright);font-weight:600;padding:8px 12px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:4px}
.header-btn:active{opacity:.6}
.header-btn svg{width:20px;height:20px}
.header-back{padding:8px;margin-left:-8px;display:flex;align-items:center}
.header-back svg{width:24px;height:24px}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px 20px}
.content::-webkit-scrollbar{display:none}

.tab-bar{display:flex;background:var(--bg2);border-top:1px solid var(--bg3);padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;color:var(--text3);font-size:10px;font-weight:600;transition:color .2s}
.tab.active{color:var(--green-bright)}
.tab svg{width:22px;height:22px}
.tab:active{opacity:.6}

.card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--bg3)}
.card-title{font-size:16px;font-weight:700;margin-bottom:8px}
.card-sub{font-size:13px;color:var(--text2)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--green);color:#fff;border-radius:var(--radius-sm);padding:12px 20px;font-size:15px;font-weight:600;width:100%;transition:background .2s}
.btn:active{background:var(--green-dim)}
.btn-outline{background:transparent;border:1px solid var(--green);color:var(--green-bright)}
.btn-outline:active{background:var(--green-dim)}
.btn-danger{background:var(--red)}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.btn-icon{width:40px;height:40px;border-radius:50%;padding:0;font-size:20px}

.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--bg4);color:var(--green-bright)}

.search-bar{position:relative;margin-bottom:16px}
.search-bar input{padding-left:36px}
.search-bar svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text3)}

.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{white-space:nowrap;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;background:var(--bg3);color:var(--text2);border:1px solid transparent;flex-shrink:0}
.filter-chip.active{background:var(--green-dim);color:var(--green-bright);border-color:var(--green)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;padding:24px 20px;padding-bottom:max(24px,env(safe-area-inset-bottom));width:100%;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.exercise-item{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--bg3)}
.exercise-item:last-child{border-bottom:none}
.exercise-info{flex:1}
.exercise-name{font-size:15px;font-weight:600}
.exercise-meta{font-size:12px;color:var(--text2);margin-top:2px}
.exercise-add{color:var(--green-bright);font-size:24px;padding:8px}

.set-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bg3)}
.set-num{width:32px;font-size:14px;font-weight:700;color:var(--text2);text-align:center}
.set-input{width:72px;text-align:center;padding:8px 4px;font-size:16px;font-weight:600}
.set-check{width:36px;height:36px;border-radius:50%;border:2px solid var(--bg4);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.set-check.done{background:var(--green);border-color:var(--green)}
.set-label{font-size:12px;color:var(--text3);text-align:center}

.timer-display{font-size:48px;font-weight:700;font-variant-numeric:tabular-nums;text-align:center;padding:20px 0;color:var(--green-bright)}
.timer-controls{display:flex;gap:12px;justify-content:center}

.floating-timer{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--bg2);border-top:2px solid var(--green);padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;animation:slideUp .2s ease}
.floating-timer .ft-time{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--green-bright)}
.floating-timer .ft-controls{display:flex;gap:8px;align-items:center}

.workout-topbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0 12px;border-bottom:1px solid var(--bg3);margin:-16px -20px 12px;padding:8px 20px 12px}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.timer-pills{display:flex;gap:6px}
.timer-pill{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;background:var(--bg3);color:var(--text2);border:1px solid transparent}
.timer-pill.active{background:var(--green-dim);color:var(--green-bright);border-color:var(--green)}

.stat-card{text-align:center;padding:16px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--bg3)}
.stat-value{font-size:28px;font-weight:800;color:var(--green-bright)}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px}
.cal-header{text-align:center;font-size:11px;color:var(--text3);padding:8px 0;font-weight:600}
.cal-day{text-align:center;padding:8px 0;font-size:13px;color:var(--text2);border-radius:8px;position:relative}
.cal-day.today{color:var(--text);font-weight:700}
.cal-day.has-workout{color:var(--green-bright);font-weight:700}
.cal-day.has-workout::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--green-bright)}
.cal-day.selected{background:var(--green-dim)}
.cal-day.empty{visibility:hidden}
.cal-day:active{background:var(--bg4)}

.chart-container{position:relative;width:100%;height:250px;margin:12px 0}

.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:15px;margin-bottom:16px}

.toggle-group{display:flex;background:var(--bg3);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:16px}
.toggle-opt{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--text2);transition:all .2s}
.toggle-opt.active{background:var(--green);color:#fff}

.bw-entry{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bg3)}
.bw-date{font-size:13px;color:var(--text2)}
.bw-weight{font-size:16px;font-weight:700}

.workout-exercise-card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--bg3)}
.workout-exercise-card.active-exercise{border-color:var(--green)}
.we-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.we-name{font-size:16px;font-weight:700}
.we-last{font-size:12px;color:var(--text2);margin-bottom:12px;font-style:italic}

.template-card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--bg3)}
.template-card:active{border-color:var(--green)}
.template-name{font-size:17px;font-weight:700;margin-bottom:4px}
.template-info{font-size:13px;color:var(--text2)}

.history-workout{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--bg3)}
.history-workout:active{border-color:var(--green)}
.hw-name{font-size:16px;font-weight:700}
.hw-date{font-size:12px;color:var(--text2)}
.hw-stats{display:flex;gap:16px;margin-top:8px;font-size:13px;color:var(--text2)}

.page{display:none}
.page.active{display:block}
.sub-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:50;display:none;flex-direction:column}
.sub-page.active{display:flex}

.pr-badge{display:inline-block;background:var(--yellow);color:#000;font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;margin-left:6px}

.swipe-hint{font-size:12px;color:var(--text3);text-align:center;padding:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.gap-8{gap:8px}.gap-12{gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.text-center{text-align:center}
.text-green{color:var(--green-bright)}
.text-red{color:var(--red)}
.text-sm{font-size:13px}
.text-xs{font-size:11px}
.fw-700{font-weight:700}
.w-full{width:100%}

.goal-card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--bg3);position:relative}
.goal-card.highlight{border-color:var(--green)}
.goal-timeframe{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.goal-timeframe.week{color:var(--green-bright)}
.goal-timeframe.month{color:#3498db}
.goal-timeframe.quarter{color:#9b59b6}
.goal-title{font-size:16px;font-weight:700;margin-bottom:4px}
.goal-detail{font-size:13px;color:var(--text2);margin-bottom:12px}
.goal-progress-bar{background:var(--bg4);border-radius:6px;height:8px;overflow:hidden;margin-bottom:6px}
.goal-progress-fill{height:100%;border-radius:6px;transition:width .3s}
.goal-progress-fill.week{background:var(--green-bright)}
.goal-progress-fill.month{background:#3498db}
.goal-progress-fill.quarter{background:#9b59b6}
.goal-progress-text{font-size:12px;color:var(--text2);display:flex;justify-content:space-between}
.goal-empty{background:var(--bg2);border-radius:var(--radius);padding:20px 16px;margin-bottom:12px;border:2px dashed var(--bg4);text-align:center}
.goal-empty:active{border-color:var(--green)}
.goal-empty .plus{font-size:24px;color:var(--text3);margin-bottom:4px}
.goal-empty p{font-size:13px;color:var(--text3)}
.badge-complete{position:absolute;top:12px;right:12px;background:var(--green);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:4px}
.goal-form-group{margin-bottom:16px}
.goal-form-group label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block}

.user-picker{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.user-picker h1{font-size:32px;font-weight:800;color:var(--green-bright)}
.user-picker p{font-size:16px;color:var(--text2);margin-bottom:16px}
.user-picker .pick-btn{width:200px;padding:18px;font-size:18px;font-weight:700;background:var(--green);color:#fff;border-radius:var(--radius);border:none;cursor:pointer}
.user-picker .pick-btn:active{background:var(--green-dim)}

.lb-table{width:100%;border-collapse:collapse}
.lb-table th{font-size:11px;color:var(--text3);text-transform:uppercase;padding:8px 4px;text-align:center;letter-spacing:.5px}
.lb-table td{font-size:15px;padding:8px 4px;text-align:center}
.lb-table td:first-child{text-align:left;color:var(--text2);font-size:13px}
.lb-leader{color:var(--green-bright);font-weight:700}

.cardio-fields{display:flex;align-items:flex-end;gap:8px;flex:1}
.cardio-field{display:flex;flex-direction:column;align-items:center;gap:2px}
.cardio-field label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.5px}
.cardio-field input{width:60px;text-align:center;padding:8px 4px;font-size:16px;font-weight:600}

.interval-fs{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background .3s}
.interval-fs .if-round{font-size:20px;font-weight:600;margin-bottom:16px}

.interval-fs .if-btn{margin-top:40px;padding:14px 40px;font-size:16px;font-weight:700;border-radius:var(--radius-sm);border:none;cursor:pointer}

</style>

let DB_NAME=currentUser?'LiftinStuff_'+currentUser:'LiftinStuff';const DB_VER=2;
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('exercises'))d.createObjectStore('exercises',{keyPath:'id'});if(!d.objectStoreNames.contains('templates'))d.createObjectStore('templates',{keyPath:'id'});if(!d.objectStoreNames.contains('workouts'))d.createObjectStore('workouts',{keyPath:'id'});if(!d.objectStoreNames.contains('bodyweight'))d.createObjectStore('bodyweight',{keyPath:'date'});if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'});if(!d.objectStoreNames.contains('goals'))d.createObjectStore('goals',{keyPath:'id'})};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=e=>rej(e)})}
function dbPut(store,data){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(data);tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})}
function dbGet(store,key){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)})}
function dbGetAll(store){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).getAll();r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)})}
function dbDelete(store,key){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})}

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

// Debounced search to prevent full re-render on every keystroke
let _searchTimeout;
function debouncedSearch(key, value, delay=150) {
    clearTimeout(_searchTimeout);
    _searchTimeout = setTimeout(() => {
        if(state.showExercisePicker) {
            // Targeted DOM update: only replace the exercise list inside the picker modal
            state[key] = value;
            updatePickerResults();
        } else {
            setState({[key]: value});
        }
    }, delay);
}

// Targeted update for exercise picker results (avoids full re-render)
function updatePickerResults() {
    const container = document.getElementById('picker-results');
    if(!container) return;
    let filtered = getAllExercises();
    if(state.libBodyFilter !== 'All') filtered = filtered.filter(e => e.body === state.libBodyFilter);
    if(state.libEquipFilter !== 'All') filtered = filtered.filter(e => e.equip === state.libEquipFilter);
    if(state.libSearch) filtered = filtered.filter(e => e.name.toLowerCase().includes(state.libSearch.toLowerCase()));
    container.innerHTML = filtered.map(ex => `
        <div class="exercise-item" onclick="pickExercise('${ex.id}')">
            <div class="exercise-info"><div class="exercise-name">${ex.name}</div><div class="exercise-meta">${ex.body} · ${ex.equip}</div></div>
            <span class="exercise-add">+</span>
        </div>`).join('');
}

// Destroy Chart.js instances before re-render to prevent memory leaks
function destroyCharts() {
    const canvases = document.querySelectorAll('canvas');
    canvases.forEach(c => {
        const chart = Chart.getChart(c);
        if(chart) chart.destroy();
    });
}
const fmtDate=d=>{const dt=new Date(d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};
const fmtTime=s=>{const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec.toString().padStart(2,'0')}`};
const fmtDuration=s=>{const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);return h>0?`${h}h ${m}m`:`${m}m`};
const dayKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const getMonday=d=>{const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);dt.setHours(0,0,0,0);return dt};
const weekStart=getMonday(new Date());

function getLastPerformance(exerciseId){
  const sorted=[...state.workouts].sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
  for(const w of sorted){
    const ex=w.exercises.find(e=>e.exerciseId===exerciseId);
    if(ex&&ex.sets.some(s=>s.done))return ex;
  }
  return null;
}

function getExercisePR(exerciseId){
  let maxWeight=0;
  for(const w of state.workouts){
    const ex=w.exercises.find(e=>e.exerciseId===exerciseId);
    if(ex)for(const s of ex.sets)if(s.done&&s.weight>maxWeight)maxWeight=s.weight;
  }
  return maxWeight;
}

function calcVolume(workout){
  let total=0;
  for(const ex of workout.exercises){
    if(ex.isCardio)continue;
    for(const s of ex.sets)if(s.done)total+=(s.weight||0)*(s.reps||0);
  }
  return total;
}

function getTimerRemaining(){
  if(!state.timerTargetSeconds)return 0;
  const elapsed=state.timerPausedAccumulated+(state.timerRunning&&state.timerStartedAt?Date.now()-state.timerStartedAt:0);
  return Math.max(0,Math.ceil((state.timerTargetSeconds*1000-elapsed)/1000));
}

function isStepExercise(name){return /stair|climber|step/i.test(name)}
function isDistExercise(name){return /run|row|bike|cycle|elliptical|ski.?erg/i.test(name)}

function getWeekId(){
  const m=getMonday(new Date());
  return m.toISOString().slice(0,10);
}
function getWeekStartStr(){
  return getMonday(new Date()).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function getCardioMinutes(workout){
  let total=0;
  for(const ex of workout.exercises){
    const exData=getAllExercises().find(e=>e.id===ex.exerciseId);
    if(exData&&exData.isCardio){
      if(ex.sets&&ex.sets.length>0){
        for(const s of ex.sets){if(s.done)total+=(s.reps||0)}
      }else{
        total+=(ex.durationMin||0);
      }
    }
  }
  return total;
}

function getStreak(){
  if(state.workouts.length===0)return 0;
  let streak=0;let d=new Date();
  while(true){
    const mon=getMonday(d);const end=new Date(mon);end.setDate(end.getDate()+7);
    if(state.workouts.some(w=>{const wd=new Date(w.startTime);return wd>=mon&&wd<end})){
      streak++;d.setDate(d.getDate()-7);
    }else break;
  }
  return streak;
}

function getWeekWorkouts(){
  return state.workouts.filter(w=>new Date(w.startTime)>=weekStart);
}

function getSetsPerBodyPart(workouts){
  const counts={};
  BODY_PARTS.forEach(bp=>counts[bp]=0);
  for(const w of workouts)for(const ex of w.exercises){
    const doneSets=ex.sets.filter(s=>s.done).length;
    if(counts[ex.body]!==undefined)counts[ex.body]+=doneSets;
  }
  return counts;
}

function render(){
  const app=document.getElementById('app');
  // Destroy Chart.js instances before replacing DOM to prevent memory leaks
  destroyCharts();
  // Preserve scroll position (#5 fix)
  const contentEl=document.getElementById('main-content');
  const scrollTop=contentEl?contentEl.scrollTop:0;
  // Preserve focused input
  const focused=document.activeElement;
  const focusId=focused?focused.getAttribute('data-sid'):null;
  const focusVal=focused?focused.value:null;
  const focusSel=focused?focused.selectionStart:null;

  let floatingTimer='';
  const _timerRemaining=getTimerRemaining();
  if(state.subPage==='active-workout'&&(state.timerRunning||_timerRemaining>0)){
    floatingTimer=`<div class="floating-timer">
      <div class="ft-time">${fmtTime(_timerRemaining)}</div>
      <div class="ft-controls">
        <button class="btn btn-sm" style="padding:8px 14px" onclick="toggleTimer()">${state.timerRunning?'Pause':'Resume'}</button>
        <button class="btn btn-sm btn-outline" style="padding:8px 14px" onclick="resetTimer()">Stop</button>
      </div>
    </div>`;
  }

  app.innerHTML=renderHeader()+`<div class="content" id="main-content" style="${floatingTimer?'padding-bottom:80px':''}">`+renderPage()+`</div>`+renderTabBar()+floatingTimer+renderModals();

  // Restore scroll position
  const newContent=document.getElementById('main-content');
  if(newContent)newContent.scrollTop=scrollTop;
  // Restore focus — set value BEFORE focus to prevent keyboard flicker on mobile
  if(focusId){
    requestAnimationFrame(() => {
      const el=document.querySelector(`[data-sid="${focusId}"]`);
      if(el){
        el.value=focusVal||'';
        el.focus();
        if(focusSel!==null)try{el.setSelectionRange(focusSel,focusSel)}catch(e){}
      }
    });
  }
  attachEvents();
}

// GOALS TAB
// ============================================================
function getGoalProgress(goal){
  const now=new Date();
  const start=new Date(goal.startDate);
  const end=new Date(goal.endDate);
  const expired=now>end;

  if(goal.type==='gym_days'){
    const count=state.workouts.filter(w=>{
      const d=new Date(w.startTime);
      return d>=start&&d<=end;
    }).length;
    const pct=Math.min(100,Math.round((count/goal.target)*100));
    return {current:count,target:goal.target,pct,label:`${count} of ${goal.target} completed`,expired,complete:count>=goal.target};
  }

  if(goal.type==='pr'){
    let bestInPeriod=0;
    for(const w of state.workouts){
      const d=new Date(w.startTime);
      if(d>=start&&d<=end){
        for(const ex of w.exercises){
          if(ex.name===goal.exercise){
            for(const s of ex.sets){
              if(s.done&&s.weight>0&&s.weight>bestInPeriod)bestInPeriod=s.weight;
            }
          }
        }
      }
    }
    // Also check all-time PR before goal start for baseline
    let baseline=0;
    for(const w of state.workouts){
      const d=new Date(w.startTime);
      if(d<start){
        for(const ex of w.exercises){
          if(ex.name===goal.exercise){
            for(const s of ex.sets){
              if(s.done&&s.weight>0&&s.weight>baseline)baseline=s.weight;
            }
          }
        }
      }
    }
    const currentPR=Math.max(bestInPeriod,baseline);
    const needed=goal.target-baseline;
    const gained=currentPR-baseline;
    const pct=needed>0?Math.min(100,Math.round((gained/needed)*100)):currentPR>=goal.target?100:0;
    return {current:currentPR,target:goal.target,pct,label:`Current PR: ${currentPR} lbs · ${Math.max(0,goal.target-currentPR)} lbs to go`,expired,complete:currentPR>=goal.target};
  }

  if(goal.type==='weight'){
    const bwInPeriod=state.bodyweights.filter(b=>{
      const d=new Date(b.date);
      return d>=start&&d<=end;
    }).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const latestBW=bwInPeriod.length>0?bwInPeriod[0].weight:null;
    const startBW=state.bodyweights.filter(b=>new Date(b.date)<=start).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const baseWeight=startBW.length>0?startBW[0].weight:(latestBW||0);

    if(!latestBW)return {current:0,target:goal.target,pct:0,label:'No weigh-ins yet',expired,complete:false};

    const goingDown=goal.target<baseWeight;
    const totalChange=Math.abs(goal.target-baseWeight);
    const currentChange=goingDown?(baseWeight-latestBW):(latestBW-baseWeight);
    const pct=totalChange>0?Math.min(100,Math.round((Math.max(0,currentChange)/totalChange)*100)):0;
    const complete=goingDown?latestBW<=goal.target:latestBW>=goal.target;
    return {current:latestBW,target:goal.target,pct,label:`Current: ${latestBW} lbs · Target: ${goal.target} lbs`,expired,complete};
  }

  return {current:0,target:0,pct:0,label:'',expired:false,complete:false};
}

function daysLeft(endDate){
  const diff=Math.ceil((new Date(endDate)-new Date())/(1000*60*60*24));
  return Math.max(0,diff);
}

function goalEndDate(timeframe){
  const now=new Date();
  if(timeframe==='week'){const d=new Date(now);d.setDate(d.getDate()+7);return d.toISOString();}
  if(timeframe==='month'){const d=new Date(now);d.setMonth(d.getMonth()+1);return d.toISOString();}
  if(timeframe==='quarter'){const d=new Date(now);d.setMonth(d.getMonth()+3);return d.toISOString();}
  return now.toISOString();
}

          <div class="goal-title">${goal.title}</div>
          <div class="goal-detail">${prog.label}</div>
          <div class="goal-progress-bar"><div class="goal-progress-fill ${tf.cls}" style="width:${prog.pct}%"></div></div>
          <div class="goal-progress-text"><span>${prog.pct}%</span><span style="color:var(--red);cursor:pointer" onclick="deleteGoalAndNew('${goal.id}','${tf.key}')">Replace →</span></div>
        </div>`;
      } else {
        const dl=daysLeft(goal.endDate);
        const endFmt=new Date(goal.endDate).toLocaleDateString('en-US',{month:'short',day:'numeric'});
        html+=`<div class="goal-card${dl<=2?' highlight':''}">
          <div class="goal-timeframe ${tf.cls}">${tf.label}</div>
          <div class="goal-title">${goal.title}</div>
          <div class="goal-detail">${prog.label} · ${dl} day${dl!==1?'s':''} left</div>
          <div class="goal-progress-bar"><div class="goal-progress-fill ${tf.cls}" style="width:${prog.pct}%"></div></div>
          <div class="goal-progress-text"><span>${prog.pct}%</span><span>Ends ${endFmt}</span></div>
          <div style="margin-top:10px;text-align:right"><button class="btn btn-sm btn-outline" style="width:auto;font-size:11px;padding:6px 10px;color:var(--red);border-color:var(--red)" onclick="deleteGoal('${goal.id}')">Remove</button></div>
        </div>`;
      }
    } else {
      html+=`<div class="goal-empty" onclick="openSetGoal('${tf.key}')">
        <div class="plus">+</div>
        <p>Set a ${tf.key==='week'?'1-week':tf.key==='month'?'1-month':'3-month'} goal</p>
      </div>`;
    }
  }

  // Completed goals history
  const completed=state.goals.filter(g=>g.completed||getGoalProgress(g).complete);
  // Don't show active completed ones again - they're shown above
  // Show archived ones (goals that have been replaced)
  const archived=state.goals.filter(g=>g.archived);
  if(archived.length>0){
    html+=`<div style="margin-top:24px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:12px">PAST GOALS</div>`;
    for(const g of archived.sort((a,b)=>new Date(b.endDate)-new Date(a.endDate)).slice(0,10)){
      const tfInfo=timeframes.find(t=>t.key===g.timeframe);
      const wasComplete=g.completed;
      html+=`<div class="goal-card" style="opacity:.6">
        <div class="goal-timeframe ${tfInfo?.cls||''}">${tfInfo?.label||g.timeframe.toUpperCase()}</div>
        <div class="goal-title">${g.title}</div>
        <div class="goal-detail">${wasComplete?'Completed ✓':'Expired'}</div>
      </div>`;
    }
  }

  // Set goal modal
  if(state.showSetGoal){
    const tf=state._goalTimeframe;
    const tfLabel=tf==='week'?'1 Week':tf==='month'?'1 Month':'3 Months';
    const allEx=getAllExercises();

    html+=`<div class="modal-overlay" onclick="if(event.target===this)setState({showSetGoal:false})">
      <div class="modal">
        <div class="modal-title">Set a Goal</div>
        <div class="goal-form-group">
          <label>Timeframe</label>
          <input type="text" value="${tfLabel}" disabled style="opacity:.6">
        </div>
        <div class="goal-form-group">
          <label>Goal Type</label>
          <select data-sid="goal-type" onchange="setState({_goalType:this.value})">
            <option value="gym_days" ${state._goalType==='gym_days'?'selected':''}>X Total Gym Days</option>
            <option value="pr" ${state._goalType==='pr'?'selected':''}>PR of X on Exercise</option>
            <option value="weight" ${state._goalType==='weight'?'selected':''}>Body Weight of X lbs</option>
          </select>
        </div>
        ${state._goalType==='pr'?`
          <div class="goal-form-group">
            <label>Exercise</label>
            <select data-sid="goal-exercise">
              ${allEx.filter(e=>e.body!=='Cardio').map(e=>`<option value="${e.name}">${e.name}</option>`).join('')}
            </select>
          </div>
          <div class="goal-form-group">
            <label>Target Weight (lbs)</label>
            <input type="number" data-sid="goal-target" placeholder="e.g. 225" inputmode="numeric">
          </div>
        `:''}
        ${state._goalType==='gym_days'?`
          <div class="goal-form-group">
            <label>Number of Gym Days</label>
            <input type="number" data-sid="goal-target" placeholder="e.g. ${tf==='week'?'3':tf==='month'?'12':'40'}" inputmode="numeric">
          </div>
        `:''}
        ${state._goalType==='weight'?`
          <div class="goal-form-group">
            <label>Target Body Weight (lbs)</label>
            <input type="number" data-sid="goal-target" placeholder="e.g. 180" inputmode="decimal">
          </div>
        `:''}
        <button class="btn" onclick="saveGoal()">Set Goal</button>
      </div>
    </div>`;
  }

  return html;
}

function openSetGoal(timeframe){
  setState({showSetGoal:true,_goalTimeframe:timeframe,_goalType:'gym_days'});
}

async function saveGoal(){
  const tf=state._goalTimeframe;
  const type=state._goalType;
  const targetEl=document.querySelector('[data-sid="goal-target"]');
  const target=targetEl?parseFloat(targetEl.value):0;

  if(!target||target<=0){alert('Please enter a target value');return;}

  let title='';
  let exercise=null;

  if(type==='gym_days'){
    title=`${target} Gym Days`;
  } else if(type==='pr'){
    const exEl=document.querySelector('[data-sid="goal-exercise"]');
    exercise=exEl?exEl.value:'';
    if(!exercise){alert('Please select an exercise');return;}
    title=`PR ${target} lbs on ${exercise}`;
  } else if(type==='weight'){
    title=`Reach ${target} lbs`;
  }

  const goal={
    id:'goal_'+Date.now(),
    timeframe:tf,
    type:type,
    title:title,
    target:target,
    exercise:exercise,
    startDate:new Date().toISOString(),
    endDate:goalEndDate(tf),
    completed:false,
    archived:false
  };

  // Archive any existing goal in this timeframe
  const existing=state.goals.find(g=>g.timeframe===tf&&!g.archived);
  if(existing){
    existing.archived=true;
    await dbPut('goals',existing);
  }

  state.goals.push(goal);
  await dbPut('goals',goal);
  setState({showSetGoal:false,_goalTimeframe:null,_goalType:null});
}

async function deleteGoal(id){
  const idx=state.goals.findIndex(g=>g.id===id);
  if(idx>-1){
    await dbDelete('goals',id);
    state.goals.splice(idx,1);
    render();
  }
}

async function deleteGoalAndNew(id,timeframe){
  const goal=state.goals.find(g=>g.id===id);
  if(goal){
    goal.archived=true;
    await dbPut('goals',goal);
  }
  setState({showSetGoal:true,_goalTimeframe:timeframe,_goalType:'gym_days'});
}

// ============================================================
function renderHistoryTab(){
  const year=state.calYear;
  const month=state.calMonth;
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDow=firstDay.getDay();
  const daysInMonth=lastDay.getDate();
  const today=new Date();
  const todayStr=dayKey(today);
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];

  const workoutDays=new Set();
  state.workouts.forEach(w=>{
    const d=new Date(w.startTime);
    if(d.getMonth()===month&&d.getFullYear()===year)workoutDays.add(d.getDate());
  });

  let calDays='';
  for(let i=0;i<startDow;i++)calDays+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=['cal-day'];
    if(dk===todayStr)cls.push('today');
    if(workoutDays.has(d))cls.push('has-workout');
    if(state.calSelected===dk)cls.push('selected');
    calDays+=`<div class="${cls.join(' ')}" onclick="selectCalDay('${dk}')">${d}</div>`;
  }

  let selectedWorkouts='';
  if(state.calSelected){
    const dayW=state.workouts.filter(w=>dayKey(new Date(w.startTime))===state.calSelected).sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
    if(dayW.length>0){
      selectedWorkouts=dayW.map(w=>`
        <div class="history-workout" onclick="viewWorkout('${w.id}')">
          <div class="flex-between"><span class="hw-name">${w.name}</span><span class="hw-date">${new Date(w.startTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</span></div>
          <div class="hw-stats"><span>${w.exercises.length} exercises</span><span>${calcVolume(w).toLocaleString()} lbs</span>${w.endTime?`<span>${fmtDuration(Math.floor((new Date(w.endTime)-new Date(w.startTime))/1000))}</span>`:''}</div>
        </div>`).join('');
    } else {
      selectedWorkouts='<div class="text-sm text-center" style="color:var(--text3);padding:16px">No workouts on this day</div>';
    }
  }

  const allSorted=[...state.workouts].sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));

  return `
    <div class="flex-between mb-12">
      <button class="header-back" onclick="changeMonth(-1)">${icons.back}</button>
      <span class="fw-700">${monthNames[month]} ${year}</span>
      <button class="header-back" style="transform:rotate(180deg)" onclick="changeMonth(1)">${icons.back}</button>
    </div>
    <div class="calendar">
      ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-header">${d}</div>`).join('')}
      ${calDays}
    </div>
    ${selectedWorkouts}
    ${!state.calSelected?`<div class="card-title mb-8 mt-16">All Workouts</div>${allSorted.length===0?'<div class="empty-state"><p>No workout history yet</p></div>':allSorted.slice(0,20).map(w=>`
      <div class="history-workout" onclick="viewWorkout('${w.id}')">
        <div class="flex-between"><span class="hw-name">${w.name}</span><span class="hw-date">${fmtDate(w.startTime)}</span></div>
        <div class="hw-stats"><span>${w.exercises.length} exercises</span><span>${calcVolume(w).toLocaleString()} lbs</span></div>
      </div>`).join('')}`:''}
  `;
}

function removeExFromSession(idx){

  saveSession();
  render();
}

function renderWorkoutDetail(){

  const vol=calcVolume(w);
  const dur=w.totalDuration||w.endTime?Math.floor((new Date(w.endTime||w.startTime)-new Date(w.startTime))/1000):0;
  const latestBW=state.bodyweights.length>0?[...state.bodyweights].sort((a,b)=>new Date(b.date)-new Date(a.date))[0].weight:180;
  const cals=getSessionCalories(w,latestBW);

      return `<div class="card">
        <div class="card-title">${ex.name}</div>
        <div class="text-xs mb-8" style="color:var(--text2)">${ex.body} · ${ex.equip}</div>

// ============================================================
// CALORIE ESTIMATION
// ============================================================
// MET-based estimates: calories = MET * bodyWeightKg * durationHours
// For lifting: ~3-6 MET depending on intensity. We use set duration estimate.
// For cardio: ~6-12 MET depending on type.
const CARDIO_METS={'Treadmill Run':9.8,'Treadmill Walk (Incline)':6,'Treadmill Sprint Intervals':11,'Assault Bike':10.5,'Assault Bike Intervals':12,'Rowing Machine':7,'Rowing Intervals':9.5,'Stair Climber':9,'Stair Climber (Zone 2)':6.5,'Stationary Bike':7.5,'Stationary Bike Intervals':10,'Elliptical':5.5,'Outdoor Run':9.8,'Outdoor Sprint Intervals':11,'Jump Rope':11,'Battle Ropes':10,'Box Jumps':8,'Burpees':10,'Ski Erg':7.5,'4x4 Cardio on Rower':8.5,'Zone 2 Cardio on Stairs':6.5};
function estimateCalories(exercise,bodyWeightLbs){
  const bwKg=(bodyWeightLbs||180)*0.4536;
  if(exercise.isCardio){
    const met=CARDIO_METS[exercise.name]||7;
    let mins=0;
    if(exercise.sets&&exercise.sets.length>0)mins=exercise.sets.reduce((s,st)=>s+(st.done?(st.reps||0):0),0);
    if(mins===0)mins=exercise.durationMin||10;
    return Math.round(met*bwKg*(mins/60));
  }
  // Strength: ~5 MET, estimate ~40s per set
  const doneSets=exercise.sets?exercise.sets.filter(s=>s.done).length:0;
  const mins=(doneSets*40)/60;
  const met=5;
  return Math.round(met*bwKg*(mins/60));
}

function getSessionCalories(session,bwLbs){
  if(!session)return 0;
  return session.exercises.reduce((sum,ex)=>sum+estimateCalories(ex,bwLbs),0);
}

// ============================================================
// INTERVAL TIMER
// ============================================================
const INTERVAL_PRESETS={
  '4x4':{activeSeconds:240,restSeconds:180,rounds:4,label:'4x4'},
  '30/30':{activeSeconds:30,restSeconds:30,rounds:10,label:'30/30'},
  'tabata':{activeSeconds:20,restSeconds:10,rounds:8,label:'Tabata'},
};

function openIntervalTimer(exIdx){
  state.intervalTimer={
    activeSeconds:240,restSeconds:180,rounds:4,
    phase:'config',currentPhase:'active',currentRound:1,
    phaseStartedAt:null,phasePausedAccum:0,
    completedActiveTime:0,completedRestTime:0,
    exerciseIdx:exIdx,preset:'4x4'
  };
  state.subPage='interval-timer';
  render();
}

function cancelIntervalTimer(){
  clearInterval(state.intervalTimerInterval);
  state.intervalTimer=null;
  state.subPage='active-workout';
  saveSession();
  render();
}

function applyIntervalPreset(key){
  if(!state.intervalTimer)return;
  if(key==='custom'){
    state.intervalTimer.preset='custom';
  }else{
    const p=INTERVAL_PRESETS[key];
    state.intervalTimer.activeSeconds=p.activeSeconds;
    state.intervalTimer.restSeconds=p.restSeconds;
    state.intervalTimer.rounds=p.rounds;
    state.intervalTimer.preset=key;
  }
  render();
}

function startIntervalTimer(){
  const it=state.intervalTimer;if(!it)return;
  it.phase='running';it.currentPhase='active';it.currentRound=1;
  it.phaseStartedAt=Date.now();it.phasePausedAccum=0;
  it.completedActiveTime=0;it.completedRestTime=0;
  clearInterval(state.intervalTimerInterval);
  state.intervalTimerInterval=setInterval(intervalTimerTick,200);
  try{if('wakeLock' in navigator)navigator.wakeLock.request('screen').catch(()=>{})}catch(e){}
  saveSession();
  render();
}

function getIntervalPhaseRemaining(){
  const it=state.intervalTimer;if(!it||it.phase==='config'||it.phase==='done')return 0;
  const phaseDur=it.currentPhase==='active'?it.activeSeconds:it.restSeconds;
  const elapsed=it.phasePausedAccum+(it.phase==='running'&&it.phaseStartedAt?Date.now()-it.phaseStartedAt:0);
  return Math.max(0,Math.ceil((phaseDur*1000-elapsed)/1000));
}

function intervalTimerTick(){
  const it=state.intervalTimer;if(!it||it.phase!=='running')return;
  const remaining=getIntervalPhaseRemaining();
  if(remaining<=0){
    // Phase complete
    if(it.currentPhase==='active'){
      it.completedActiveTime+=it.activeSeconds;
      if(it.restSeconds>0){
        it.currentPhase='rest';
        it.phaseStartedAt=Date.now();it.phasePausedAccum=0;
        if('vibrate' in navigator)navigator.vibrate([200,100,200]);
        saveSession();render();
      }else{
        // No rest, go to next round or done
        if(it.currentRound<it.rounds){
          it.currentRound++;it.currentPhase='active';
          it.phaseStartedAt=Date.now();it.phasePausedAccum=0;
          if('vibrate' in navigator)navigator.vibrate([200,100,200]);
          saveSession();render();
        }else{
          completeIntervalTimer();
        }
      }
    }else{
      it.completedRestTime+=it.restSeconds;
      if(it.currentRound<it.rounds){
        it.currentRound++;it.currentPhase='active';
        it.phaseStartedAt=Date.now();it.phasePausedAccum=0;
        if('vibrate' in navigator)navigator.vibrate([200,100,200]);
        saveSession();render();
      }else{
        completeIntervalTimer();
      }
    }
  }else{
    // Update DOM directly
    const tEl=document.getElementById('interval-time');
    if(tEl)tEl.textContent=fmtTime(remaining);
  }
}

function pauseIntervalTimer(){
  const it=state.intervalTimer;if(!it||it.phase!=='running')return;
  it.phasePausedAccum+=Date.now()-it.phaseStartedAt;
  it.phaseStartedAt=null;
  it.phase='paused';
  clearInterval(state.intervalTimerInterval);
  saveSession();render();
}

function resumeIntervalTimer(){
  const it=state.intervalTimer;if(!it||it.phase!=='paused')return;
  it.phaseStartedAt=Date.now();
  it.phase='running';
  state.intervalTimerInterval=setInterval(intervalTimerTick,200);
  try{if('wakeLock' in navigator)navigator.wakeLock.request('screen').catch(()=>{})}catch(e){}
  saveSession();render();
}

function completeIntervalTimer(){
  const it=state.intervalTimer;if(!it)return;
  clearInterval(state.intervalTimerInterval);
  it.phase='done';
  if('vibrate' in navigator)navigator.vibrate([500,200,500,200,500]);
  // Auto-fill cardio exercise MIN field
  if(it.exerciseIdx!=null&&state.session&&state.session.exercises[it.exerciseIdx]){
    const ex=state.session.exercises[it.exerciseIdx];
    const activeMins=Math.round(it.completedActiveTime/60);
    if(ex.sets&&ex.sets.length>0){
      ex.sets[0].reps=activeMins;
      ex.sets[0].done=true;
    }
  }
  saveSession();render();
}

function endIntervalTimerAndReturn(){
  clearInterval(state.intervalTimerInterval);
  state.intervalTimer=null;
  state.subPage='active-workout';
  saveSession();render();
}

function renderIntervalTimer(){
  const it=state.intervalTimer;
  if(!it)return '<p>No timer configured</p>';

  // CONFIG screen
  if(it.phase==='config'){
    return `<div class="interval-config">
      <div class="card">
        <div class="card-title mb-12">Active Period</div>
        <div style="display:flex;align-items:center;gap:12px">
          <input type="number" data-sid="it-active-m" value="${Math.floor(it.activeSeconds/60)}" style="width:60px;text-align:center" inputmode="numeric" onchange="state.intervalTimer.activeSeconds=parseInt(this.value)*60+(state.intervalTimer.activeSeconds%60);state.intervalTimer.preset='custom'"> <span class="text-sm" style="color:var(--text2)">min</span>
          <input type="number" data-sid="it-active-s" value="${it.activeSeconds%60}" style="width:60px;text-align:center" inputmode="numeric" onchange="state.intervalTimer.activeSeconds=Math.floor(state.intervalTimer.activeSeconds/60)*60+parseInt(this.value||0);state.intervalTimer.preset='custom'"> <span class="text-sm" style="color:var(--text2)">sec</span>
        </div>
      </div>
      <div class="card">
        <div class="card-title mb-12">Rest Period</div>
        <div style="display:flex;align-items:center;gap:12px">
          <input type="number" data-sid="it-rest-m" value="${Math.floor(it.restSeconds/60)}" style="width:60px;text-align:center" inputmode="numeric" onchange="state.intervalTimer.restSeconds=parseInt(this.value)*60+(state.intervalTimer.restSeconds%60);state.intervalTimer.preset='custom'"> <span class="text-sm" style="color:var(--text2)">min</span>
          <input type="number" data-sid="it-rest-s" value="${it.restSeconds%60}" style="width:60px;text-align:center" inputmode="numeric" onchange="state.intervalTimer.restSeconds=Math.floor(state.intervalTimer.restSeconds/60)*60+parseInt(this.value||0);state.intervalTimer.preset='custom'"> <span class="text-sm" style="color:var(--text2)">sec</span>
        </div>
      </div>
      <div class="card">
        <div class="card-title mb-12">Rounds</div>
        <input type="number" data-sid="it-rounds" value="${it.rounds}" style="width:80px;text-align:center" inputmode="numeric" onchange="state.intervalTimer.rounds=parseInt(this.value)||1;state.intervalTimer.preset='custom'">
      </div>
      <div class="card-title mb-8">Presets</div>
      <div class="preset-row">
        <button class="preset-btn ${it.preset==='4x4'?'active':''}" onclick="applyIntervalPreset('4x4')">4x4</button>
        <button class="preset-btn ${it.preset==='30/30'?'active':''}" onclick="applyIntervalPreset('30/30')">30/30</button>
        <button class="preset-btn ${it.preset==='tabata'?'active':''}" onclick="applyIntervalPreset('tabata')">Tabata</button>
        <button class="preset-btn ${it.preset==='custom'?'active':''}" onclick="applyIntervalPreset('custom')">Custom</button>
      </div>
      <button class="btn mt-16" style="font-size:18px;padding:16px" onclick="startIntervalTimer()">START</button>
    </div>`;
  }

  // DONE screen
  if(it.phase==='done'){
    const totalActive=it.completedActiveTime;
    const totalRest=it.completedRestTime;
    const totalTime=totalActive+totalRest;
    return `<div class="interval-fs" style="background:var(--bg)">
      <div style="font-size:32px;font-weight:800;color:var(--green-bright);margin-bottom:24px">DONE!</div>
      <div class="text-sm mb-8" style="color:var(--text2)">${it.rounds} rounds completed</div>
      <div class="fw-700 mb-4" style="font-size:20px">${fmtTime(totalTime)} total time</div>
      <div class="text-sm mb-24" style="color:var(--text2)">${fmtTime(totalActive)} active / ${fmtTime(totalRest)} rest</div>
      <button class="if-btn" style="background:var(--green);color:#fff" onclick="endIntervalTimerAndReturn()">Save & Return to Workout</button>
    </div>`;
  }

  // RUNNING / PAUSED screen (fullscreen)
  const isActive=it.currentPhase==='active';
  const isPaused=it.phase==='paused';
  const remaining=getIntervalPhaseRemaining();
  const bgColor=isPaused?'var(--bg2)':isActive?'#52b788':'#0a0f0a';
  const textColor=isPaused?'var(--text)':isActive?'#000':'#52b788';

  if(isPaused){
    return `<div class="interval-fs" style="background:${bgColor}">
      <div class="if-round" style="color:var(--text2)">ROUND ${it.currentRound}/${it.rounds}</div>
      <div class="if-time" style="color:var(--text)">${fmtTime(remaining)}</div>
      <div class="if-label" style="color:var(--text2)">PAUSED</div>
      <div style="display:flex;gap:12px;margin-top:40px">
        <button class="if-btn" style="background:var(--green);color:#fff" onclick="resumeIntervalTimer()">Resume</button>
        <button class="if-btn" style="background:var(--red);color:#fff" onclick="endIntervalTimerAndReturn()">End Timer</button>
      </div>
    </div>`;
  }

  return `<div class="interval-fs" style="background:${bgColor}">
    <div class="if-round" style="color:${textColor}">${isActive?'ROUND':'REST'} ${it.currentRound}/${it.rounds}</div>
    <div class="if-time" style="color:${textColor}" id="interval-time">${fmtTime(remaining)}</div>
    <div class="if-label" style="color:${textColor}">${isActive?'GO':'REST'}</div>
    <button class="if-btn" style="background:${isActive?'rgba(0,0,0,.2)':'rgba(255,255,255,.1)'};color:${textColor}" onclick="pauseIntervalTimer()">PAUSE</button>
  </div>`;
}

function timerTick(){
  const remaining=getTimerRemaining();
  if(remaining<=0){
    clearInterval(state.timerInterval);state.timerRunning=false;
    state.timerStartedAt=null;state.timerPausedAccumulated=0;state.timerTargetSeconds=0;
    if('vibrate' in navigator)navigator.vibrate([200,100,200]);
    saveSession();
    render();
  }else{
    const ftEl=document.querySelector('.ft-time');
    if(ftEl)ftEl.textContent=fmtTime(remaining);
  }
}

async function finishWorkout(){
  if(!state.session||state.session.exercises.length===0){alert('Add at least one exercise');return}
  const name=prompt('Name this workout:',state.session.name);
  if(name===null)return;
  state.session.name=name||state.session.name;
  state.session.endTime=new Date().toISOString();
  clearInterval(state.timerInterval);
  state.timerRunning=false;state.timerStartedAt=null;state.timerPausedAccumulated=0;state.timerTargetSeconds=0;
  state.intervalTimer=null;clearInterval(state.intervalTimerInterval);

  const workout={...state.session};

  await dbPut('workouts',workout);
  syncLeaderboardData(workout);

  state.session=null;state.subPage=null;
  localStorage.removeItem('liftinstuff_active_session');
  render();
}

function attachEvents(){
  // Duration counter for active workout - updates DOM directly, no re-render
  if(state.subPage==='active-workout'&&state.session){
    clearInterval(window._durInterval);
    window._durInterval=setInterval(()=>{
      const durEl=document.getElementById('workout-dur');
      if(durEl&&state.session){
        const dur=Math.floor((Date.now()-new Date(state.session.startTime).getTime())/1000);
        durEl.textContent=fmtDuration(dur);
      }
    },1000);
    // Request wake lock to prevent screen dimming
    requestWakeLock();
  }else{
    clearInterval(window._durInterval);
    releaseWakeLock();
  }
}

// ============================================================
// WAKE LOCK (prevent screen dimming during workout)
// ============================================================
let wakeLock=null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{wakeLock=null});
    }
  }catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){try{wakeLock.release()}catch(e){}}
  wakeLock=null;
}
// Re-request wake lock and update timers when page becomes visible
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    if(state.subPage==='active-workout'){
      requestWakeLock();
      if(state.timerRunning)render();
    }
    if(state.intervalTimer&&state.intervalTimer.phase==='running'){
      render();
    }
    // Check auto-stop
    checkAutoStop();
  }
});

// SESSION PERSISTENCE (localStorage)
// ============================================================
function saveSession(){
  if(state.session){
    const data={
      session:state.session,
      timerStartedAt:state.timerStartedAt,
      timerPausedAccumulated:state.timerPausedAccumulated,
      timerTargetSeconds:state.timerTargetSeconds,
      timerRunning:state.timerRunning,
      subPage:state.subPage,
      intervalTimer:state.intervalTimer
    };
    localStorage.setItem('liftinstuff_active_session',JSON.stringify(data));
  }else{
    localStorage.removeItem('liftinstuff_active_session');
  }
}

function restoreSession(){
  const saved=localStorage.getItem('liftinstuff_active_session');
  if(!saved)return;
  try{
    const data=JSON.parse(saved);
    if(!data.session)return;

    // Check auto-stop (3 hours)
    const sessionStart=new Date(data.session.startTime).getTime();
    if(Date.now()-sessionStart>3*60*60*1000){
      state.session=data.session;
      state.session.endTime=new Date(sessionStart+3*60*60*1000).toISOString();
      finishWorkoutAuto();
      return;
    }

    state.session=data.session;
    state.subPage=data.subPage||'active-workout';

    // Restore rest timer
    if(data.timerRunning&&data.timerStartedAt){
      state.timerStartedAt=data.timerStartedAt;
      state.timerPausedAccumulated=data.timerPausedAccumulated||0;
      state.timerTargetSeconds=data.timerTargetSeconds||0;
      state.timerRunning=true;
      const remaining=getTimerRemaining();
      if(remaining<=0){
        state.timerRunning=false;state.timerStartedAt=null;
        state.timerPausedAccumulated=0;state.timerTargetSeconds=0;
      }else{
        state.timerInterval=setInterval(timerTick,1000);
      }
    }

    // Restore interval timer
    if(data.intervalTimer){
      state.intervalTimer=data.intervalTimer;
      if(state.intervalTimer.phase==='running'){
        state.intervalTimerInterval=setInterval(intervalTimerTick,200);
      }
    }
  }catch(e){
    localStorage.removeItem('liftinstuff_active_session');
  }
}

function checkAutoStop(){
  if(state.session){
    const sessionStart=new Date(state.session.startTime).getTime();
    if(Date.now()-sessionStart>3*60*60*1000){
      finishWorkoutAuto();
    }
  }
}

function syncLeaderboardData(workout){
  const user=localStorage.getItem('liftinstuff_user');
  if(!user||!fbDb)return;
  const weekId=getWeekId();
  const ref=fbDb.ref('leaderboard/'+weekId+'/'+user);
  ref.once('value').then(snapshot=>{
    const existing=snapshot.val()||{workouts:0,volume:0,cardioMinutes:0};
    ref.set({
      workouts:existing.workouts+1,
      volume:existing.volume+calcVolume(workout),
      cardioMinutes:existing.cardioMinutes+getCardioMinutes(workout),
      lastUpdated:Date.now()
    });
  }).catch(()=>{});
}

function listenToLeaderboard(){
  if(!fbDb)return;
  const weekId=getWeekId();
  fbDb.ref('leaderboard/'+weekId).on('value',snapshot=>{
    state.leaderboardData=snapshot.val()||{};
    render();
  });
}

async function initApp(){
  await openDB();

  // Load custom exercises
  customExercises=await dbGetAll('exercises');

  state.templates=await dbGetAll('templates');
  state.workouts=await dbGetAll('workouts');
  state.bodyweights=await dbGetAll('bodyweight');
  state.goals=await dbGetAll('goals');

  const restSetting=await dbGet('settings','defaultRestTime');
  if(restSetting)state.defaultRestTime=restSetting.value;

  // Seed default templates on first launch
  const seeded=await dbGet('settings','templatesSeeded');
  if(!seeded&&state.templates.length===0){
    for(const t of DEFAULT_TEMPLATES){
      state.templates.push(t);
      await dbPut('templates',t);
    }
    await dbPut('settings',{key:'templatesSeeded',value:true});
  }

  // Restore active session from localStorage
  restoreSession();

  // Init Firebase
  initFirebase();

  render();
}

function init(){
  currentUser=localStorage.getItem('liftinstuff_user');
  if(!currentUser){
    renderUserPicker();
    return;
  }
  DB_NAME='LiftinStuff_'+currentUser;
  initApp();
}

init();

// Register service worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
