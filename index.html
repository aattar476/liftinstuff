<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0f0a;--bg2:#131a13;--bg3:#1a241a;--bg4:#223322;
--green:#2d6a4f;--green-light:#40916c;--green-bright:#52b788;--green-dim:#1b4332;
--text:#e8e8e8;--text2:#a0a0a0;--text3:#606060;
--red:#e74c3c;--yellow:#f1c40f;--blue:#3498db;
--radius:12px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;touch-action:manipulation}
input,select,textarea,button{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none;color:var(--text)}
input,select{background:var(--bg3);border:1px solid var(--bg4);color:var(--text);border-radius:var(--radius-sm);padding:10px 12px;font-size:16px;width:100%}
input:focus,select:focus{outline:none;border-color:var(--green-light)}
input[type="number"]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.header{padding:16px 20px 12px;background:var(--bg);border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;min-height:56px;padding-top:env(safe-area-inset-top,16px)}
.header h1{font-size:20px;font-weight:700}
.header-btn{font-size:14px;color:var(--green-bright);font-weight:600;padding:8px 12px;border-radius:var(--radius-sm)}
.header-btn:active{opacity:.6}
.header-back{font-size:24px;padding:8px;margin-left:-8px}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px 20px}
.content::-webkit-scrollbar{display:none}

.tab-bar{display:flex;background:var(--bg2);border-top:1px solid var(--bg3);padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;color:var(--text3);font-size:10px;font-weight:600;transition:color .2s}
.tab.active{color:var(--green-bright)}
.tab svg{width:22px;height:22px}
.tab:active{opacity:.6}

.card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--bg3)}
.card-title{font-size:16px;font-weight:700;margin-bottom:8px}
.card-sub{font-size:13px;color:var(--text2)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--green);color:#fff;border-radius:var(--radius-sm);padding:12px 20px;font-size:15px;font-weight:600;width:100%;transition:background .2s}
.btn:active{background:var(--green-dim)}
.btn-outline{background:transparent;border:1px solid var(--green);color:var(--green-bright)}
.btn-outline:active{background:var(--green-dim)}
.btn-danger{background:var(--red)}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.btn-icon{width:40px;height:40px;border-radius:50%;padding:0;font-size:20px}

.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--bg4);color:var(--green-bright)}

.search-bar{position:relative;margin-bottom:16px}
.search-bar input{padding-left:36px}
.search-bar svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text3)}

.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{white-space:nowrap;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;background:var(--bg3);color:var(--text2);border:1px solid transparent;flex-shrink:0}
.filter-chip.active{background:var(--green-dim);color:var(--green-bright);border-color:var(--green)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;padding:24px 20px;padding-bottom:max(24px,env(safe-area-inset-bottom));width:100%;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.exercise-item{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--bg3)}
.exercise-item:last-child{border-bottom:none}
.exercise-info{flex:1}
.exercise-name{font-size:15px;font-weight:600}
.exercise-meta{font-size:12px;color:var(--text2);margin-top:2px}
.exercise-add{color:var(--green-bright);font-size:24px;padding:8px}

.set-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bg3)}
.set-num{width:32px;font-size:14px;font-weight:700;color:var(--text2);text-align:center}
.set-input{width:72px;text-align:center;padding:8px 4px;font-size:16px;font-weight:600}
.set-check{width:36px;height:36px;border-radius:50%;border:2px solid var(--bg4);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.set-check.done{background:var(--green);border-color:var(--green)}
.set-label{font-size:12px;color:var(--text3);text-align:center}

.timer-display{font-size:48px;font-weight:700;font-variant-numeric:tabular-nums;text-align:center;padding:20px 0;color:var(--green-bright)}
.timer-controls{display:flex;gap:12px;justify-content:center}

.floating-timer{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--bg2);border-top:2px solid var(--green);padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;animation:slideUp .2s ease}
.floating-timer .ft-time{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--green-bright)}
.floating-timer .ft-controls{display:flex;gap:8px;align-items:center}

.workout-topbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0 12px;border-bottom:1px solid var(--bg3);margin:-16px -20px 12px;padding:8px 20px 12px}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.timer-pills{display:flex;gap:6px}
.timer-pill{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;background:var(--bg3);color:var(--text2);border:1px solid transparent}
.timer-pill.active{background:var(--green-dim);color:var(--green-bright);border-color:var(--green)}

.stat-card{text-align:center;padding:16px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--bg3)}
.stat-value{font-size:28px;font-weight:800;color:var(--green-bright)}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px}
.cal-header{text-align:center;font-size:11px;color:var(--text3);padding:8px 0;font-weight:600}
.cal-day{text-align:center;padding:8px 0;font-size:13px;color:var(--text2);border-radius:8px;position:relative}
.cal-day.today{color:var(--text);font-weight:700}
.cal-day.has-workout{color:var(--green-bright);font-weight:700}
.cal-day.has-workout::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--green-bright)}
.cal-day.selected{background:var(--green-dim)}
.cal-day.empty{visibility:hidden}
.cal-day:active{background:var(--bg4)}

.chart-container{position:relative;width:100%;height:250px;margin:12px 0}

.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:15px;margin-bottom:16px}

.toggle-group{display:flex;background:var(--bg3);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:16px}
.toggle-opt{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--text2);transition:all .2s}
.toggle-opt.active{background:var(--green);color:#fff}

.bw-entry{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bg3)}
.bw-date{font-size:13px;color:var(--text2)}
.bw-weight{font-size:16px;font-weight:700}

.workout-exercise-card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--bg3)}
.workout-exercise-card.active-exercise{border-color:var(--green)}
.we-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.we-name{font-size:16px;font-weight:700}
.we-last{font-size:12px;color:var(--text2);margin-bottom:12px;font-style:italic}

.template-card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--bg3)}
.template-card:active{border-color:var(--green)}
.template-name{font-size:17px;font-weight:700;margin-bottom:4px}
.template-info{font-size:13px;color:var(--text2)}

.history-workout{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--bg3)}
.history-workout:active{border-color:var(--green)}
.hw-name{font-size:16px;font-weight:700}
.hw-date{font-size:12px;color:var(--text2)}
.hw-stats{display:flex;gap:16px;margin-top:8px;font-size:13px;color:var(--text2)}

.page{display:none}
.page.active{display:block}
.sub-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:50;display:none;flex-direction:column}
.sub-page.active{display:flex}

.pr-badge{display:inline-block;background:var(--yellow);color:#000;font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;margin-left:6px}

.swipe-hint{font-size:12px;color:var(--text3);text-align:center;padding:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.gap-8{gap:8px}.gap-12{gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.text-center{text-align:center}
.text-green{color:var(--green-bright)}
.text-red{color:var(--red)}
.text-sm{font-size:13px}
.text-xs{font-size:11px}
.fw-700{font-weight:700}
.w-full{width:100%}
</style>
</head>

// ============================================================
// DATABASE (IndexedDB)
// ============================================================
const DB_NAME='LiftinStuff';const DB_VER=1;
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('exercises'))d.createObjectStore('exercises',{keyPath:'id'});if(!d.objectStoreNames.contains('templates'))d.createObjectStore('templates',{keyPath:'id'});if(!d.objectStoreNames.contains('workouts'))d.createObjectStore('workouts',{keyPath:'id'});if(!d.objectStoreNames.contains('bodyweight'))d.createObjectStore('bodyweight',{keyPath:'date'});if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'})};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=e=>rej(e)})}
function dbPut(store,data){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(data);tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})}
function dbGet(store,key){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)})}
function dbGetAll(store){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).getAll();r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)})}
function dbDelete(store,key){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})}

// HELPERS
// ============================================================
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmtDate=d=>{const dt=new Date(d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};
const fmtTime=s=>{const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec.toString().padStart(2,'0')}`};
const fmtDuration=s=>{const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);return h>0?`${h}h ${m}m`:`${m}m`};
const dayKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const getMonday=d=>{const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);dt.setHours(0,0,0,0);return dt};
const weekStart=getMonday(new Date());

function getLastPerformance(exerciseId){
  const sorted=[...state.workouts].sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
  for(const w of sorted){
    const ex=w.exercises.find(e=>e.exerciseId===exerciseId);
    if(ex&&ex.sets.some(s=>s.done))return ex;
  }
  return null;
}

function getExercisePR(exerciseId){
  let maxWeight=0;
  for(const w of state.workouts){
    const ex=w.exercises.find(e=>e.exerciseId===exerciseId);
    if(ex)for(const s of ex.sets)if(s.done&&s.weight>maxWeight)maxWeight=s.weight;
  }
  return maxWeight;
}

function calcVolume(workout){
  let total=0;
  for(const ex of workout.exercises)for(const s of ex.sets)if(s.done)total+=s.weight*s.reps;
  return total;
}

function getWeekWorkouts(){
  return state.workouts.filter(w=>new Date(w.startTime)>=weekStart);
}

function getSetsPerBodyPart(workouts){
  const counts={};
  BODY_PARTS.forEach(bp=>counts[bp]=0);
  for(const w of workouts)for(const ex of w.exercises){
    const doneSets=ex.sets.filter(s=>s.done).length;
    if(counts[ex.body]!==undefined)counts[ex.body]+=doneSets;
  }
  return counts;
}

// RENDER ENGINE
// ============================================================
function render(){
  const app=document.getElementById('app');
  // Preserve scroll position (#5 fix)
  const contentEl=document.getElementById('main-content');
  const scrollTop=contentEl?contentEl.scrollTop:0;
  // Preserve focused input
  const focused=document.activeElement;
  const focusId=focused?focused.getAttribute('data-sid'):null;
  const focusVal=focused?focused.value:null;
  const focusSel=focused?focused.selectionStart:null;

  let floatingTimer='';
  if(state.subPage==='active-workout'&&(state.timerRunning||state.timerSeconds>0)){
    floatingTimer=`<div class="floating-timer">
      <div class="ft-time">${fmtTime(state.timerSeconds)}</div>
      <div class="ft-controls">
        <button class="btn btn-sm" style="padding:8px 14px" onclick="toggleTimer()">${state.timerRunning?'Pause':'Resume'}</button>
        <button class="btn btn-sm btn-outline" style="padding:8px 14px" onclick="resetTimer()">Stop</button>
      </div>
    </div>`;
  }

  app.innerHTML=renderHeader()+`<div class="content" id="main-content" style="${floatingTimer?'padding-bottom:80px':''}">`+renderPage()+`</div>`+renderTabBar()+floatingTimer+renderModals();

  // Restore scroll position
  const newContent=document.getElementById('main-content');
  if(newContent)newContent.scrollTop=scrollTop;
  // Restore focus
  if(focusId){
    const el=document.querySelector(`[data-sid="${focusId}"]`);
    if(el){el.focus();el.value=focusVal||'';if(focusSel!==null)try{el.setSelectionRange(focusSel,focusSel)}catch(e){}}
  }
  attachEvents();
}

function renderHeader(){
  if(state.subPage==='active-workout'){
    const dur=state.session?Math.floor((Date.now()-new Date(state.session.startTime).getTime())/1000):0;
    return `<div class="header"><button class="header-back" onclick="confirmEndWorkout()">${icons.back}</button><h1>${state.session?.name||'Workout'}</h1><button class="header-btn" onclick="finishWorkout()">Finish</button></div>`;
  }
  if(state.subPage==='settings'){
    return `<div class="header"><button class="header-back" onclick="setState({subPage:null})">${icons.back}</button><h1>Settings</h1><div></div></div>`;
  }
  if(state.subPage==='edit-template'){
    return `<div class="header"><button class="header-back" onclick="setState({subPage:null,editTemplate:null})">${icons.back}</button><h1>${state.editTemplate?.id?'Edit':'New'} Template</h1><button class="header-btn" onclick="saveTemplate()">Save</button></div>`;
  }
  if(state.subPage==='workout-detail'){
    return `<div class="header"><button class="header-back" onclick="setState({subPage:null})">${icons.back}</button><h1>Workout Detail</h1><div></div></div>`;
  }
  const titles={workout:'LiftinStuff',library:'Exercise Library',templates:'Templates',stats:'Stats',history:'History'};
  let right='';
  if(state.tab==='workout')right=`<button class="header-btn" style="padding:8px" onclick="setState({subPage:'settings'})">${icons.gear}</button>`;
  return `<div class="header"><h1>${titles[state.tab]}</h1>${right}</div>`;
}

function renderTabBar(){
  if(state.subPage)return '';
  const tabs=[
    {id:'workout',icon:icons.dumbbell,label:'Workout'},
    {id:'library',icon:icons.book,label:'Library'},
    {id:'templates',icon:icons.clipboard,label:'Templates'},
    {id:'stats',icon:icons.chart,label:'Stats'},
    {id:'history',icon:icons.clock,label:'History'},
  ];
  return `<div class="tab-bar">${tabs.map(t=>`<button class="tab ${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.icon}<span>${t.label}</span></button>`).join('')}</div>`;
}

function renderPage(){
  if(state.subPage==='active-workout')return renderActiveWorkout();
  if(state.subPage==='settings')return renderSettings();
  if(state.subPage==='edit-template')return renderEditTemplate();
  if(state.subPage==='workout-detail')return renderWorkoutDetail();
  switch(state.tab){
    case 'workout':return renderWorkoutTab();
    case 'library':return renderLibraryTab();
    case 'templates':return renderTemplatesTab();
    case 'stats':return renderStatsTab();
    case 'history':return renderHistoryTab();
  }
}

function renderWorkoutTab(){
  const weekW=getWeekWorkouts();
  const totalVol=weekW.reduce((s,w)=>s+calcVolume(w),0);
  const shouldPromptBW=checkBWPrompt();

  let bwPrompt='';
  if(shouldPromptBW){
    bwPrompt=`<div class="card" style="border-color:var(--green)">
      <div class="card-title">Weekly Weigh-In</div>
      <p class="text-sm" style="color:var(--text2);margin-bottom:12px">First workout of the week! Time to log your weight.</p>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" id="bw-input" placeholder="Body weight (lbs)" style="flex:1" inputmode="decimal">
        <button class="btn btn-sm" onclick="logBodyWeight()">Log</button>
      </div>
    </div>`;
  }

  return `
    ${bwPrompt}
    <div class="grid-2 mb-16">
      <div class="stat-card"><div class="stat-value">${weekW.length}</div><div class="stat-label">Workouts This Week</div></div>
      <div class="stat-card"><div class="stat-value">${totalVol>=1000?(totalVol/1000).toFixed(1)+'k':totalVol}</div><div class="stat-label">Lbs This Week</div></div>
    </div>
    <div class="grid-2 mb-16">
      <div class="stat-card"><div class="stat-value">${weekW.reduce((s,w)=>{const bw=state.bodyweights.length?[...state.bodyweights].sort((a,b)=>new Date(b.date)-new Date(a.date))[0].weight:180;return s+getSessionCalories(w,bw)},0)}</div><div class="stat-label">Est. Calories Burned</div></div>
      <div class="stat-card"><div class="stat-value">${weekW.reduce((s,w)=>s+w.exercises.reduce((ss,ex)=>ss+ex.sets.filter(st=>st.done).length,0),0)}</div><div class="stat-label">Total Sets</div></div>
    </div>
    <button class="btn mb-12" onclick="startBlankWorkout()"><span style="font-size:20px">+</span> Start Empty Workout</button>
    <button class="btn btn-outline mb-16" onclick="showTemplateSelect()">Start From Template</button>
    ${weekW.length>0?`<div class="card-title mb-8">Recent Workouts</div>${weekW.sort((a,b)=>new Date(b.startTime)-new Date(a.startTime)).slice(0,3).map(w=>`
      <div class="history-workout" onclick="viewWorkout('${w.id}')">
        <div class="flex-between"><span class="hw-name">${w.name}</span><span class="hw-date">${fmtDate(w.startTime)}</span></div>
        <div class="hw-stats"><span>${w.exercises.length} exercises</span><span>${calcVolume(w).toLocaleString()} lbs</span>${w.endTime?`<span>${fmtDuration(Math.floor((new Date(w.endTime)-new Date(w.startTime))/1000))}</span>`:''}</div>
      </div>`).join('')}`:'<div class="empty-state"><p>No workouts yet this week.<br>Tap above to get started!</p></div>'}
  `;
}

function checkBWPrompt(){
  const monday=getMonday(new Date());
  const mondayKey=dayKey(monday);
  const thisWeekBW=state.bodyweights.find(b=>{
    const bDate=new Date(b.date);
    return bDate>=monday;
  });
  if(thisWeekBW)return false;
  const thisWeekWorkouts=state.workouts.filter(w=>new Date(w.startTime)>=monday);
  return thisWeekWorkouts.length===0;
}

  if(state.libEquipFilter!=='All')filtered=filtered.filter(e=>e.equip===state.libEquipFilter);
  if(state.libSearch)filtered=filtered.filter(e=>e.name.toLowerCase().includes(state.libSearch.toLowerCase()));

  return `
    <div class="search-bar">${icons.search}<input type="text" placeholder="Search exercises..." value="${state.libSearch}" oninput="setState({libSearch:this.value})"></div>
    <div class="filter-row">${['All',...BODY_PARTS].map(bp=>`<button class="filter-chip ${state.libBodyFilter===bp?'active':''}" onclick="setState({libBodyFilter:'${bp}'})">${bp}</button>`).join('')}</div>

    <div class="text-sm text-center mb-8" style="color:var(--text3)">${filtered.length} exercises</div>

      const pr=getExercisePR(ex.id);
      return `<div class="exercise-item">
        <div class="exercise-info"><div class="exercise-name">${ex.name}${pr>0?`<span class="pr-badge">PR: ${pr} lbs</span>`:''}</div><div class="exercise-meta">${ex.body} · ${ex.equip}</div></div>

// STATS TAB
// ============================================================
function renderStatsTab(){
  const ranges={week:'This Week',month:'This Month',all:'All Time'};
  let workouts=state.workouts;
  const now=new Date();
  if(state.statsRange==='week')workouts=workouts.filter(w=>new Date(w.startTime)>=weekStart);
  else if(state.statsRange==='month')workouts=workouts.filter(w=>{const d=new Date(w.startTime);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});

  const totalVol=workouts.reduce((s,w)=>s+calcVolume(w),0);
  const totalSets=workouts.reduce((s,w)=>s+w.exercises.reduce((ss,ex)=>ss+ex.sets.filter(st=>st.done).length,0),0);
  const bpSets=getSetsPerBodyPart(workouts);

  // Body weight data
  const bwData=[...state.bodyweights].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const latestBW=bwData.length>0?bwData[bwData.length-1]:null;

  return `
    <div class="toggle-group">${Object.entries(ranges).map(([k,v])=>`<button class="toggle-opt ${state.statsRange===k?'active':''}" onclick="setState({statsRange:'${k}'})">${v}</button>`).join('')}</div>
    <div class="toggle-group"><button class="toggle-opt ${state.statsView==='charts'?'active':''}" onclick="setState({statsView:'charts'})">Charts</button><button class="toggle-opt ${state.statsView==='numbers'?'active':''}" onclick="setState({statsView:'numbers'})">Numbers</button></div>

    <div class="grid-3 mb-16">
      <div class="stat-card"><div class="stat-value">${workouts.length}</div><div class="stat-label">Workouts</div></div>
      <div class="stat-card"><div class="stat-value">${totalVol>=1000?(totalVol/1000).toFixed(1)+'k':totalVol}</div><div class="stat-label">Total Lbs</div></div>
      <div class="stat-card"><div class="stat-value">${totalSets}</div><div class="stat-label">Total Sets</div></div>
    </div>

    ${latestBW?`<div class="card"><div class="flex-between"><span class="card-title" style="margin:0">Body Weight</span><span class="fw-700 text-green">${latestBW.weight} lbs</span></div><div class="text-xs" style="color:var(--text3);margin-top:4px">Last logged: ${fmtDate(latestBW.date)}</div></div>`:''}

    ${state.statsView==='charts'?`
      <div class="card"><div class="card-title">Sets Per Body Part</div><div class="chart-container"><canvas id="chart-bp"></canvas></div></div>
      <div class="card"><div class="card-title">Volume Over Time</div><div class="chart-container"><canvas id="chart-vol"></canvas></div></div>
      ${bwData.length>1?`<div class="card"><div class="card-title">Body Weight Trend</div><div class="chart-container"><canvas id="chart-bw"></canvas></div></div>`:''}
    `:`
      <div class="card"><div class="card-title mb-8">Sets Per Body Part</div>${BODY_PARTS.map(bp=>`<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--bg3)"><span class="text-sm">${bp}</span><span class="fw-700">${bpSets[bp]||0} sets</span></div>`).join('')}</div>
      <div class="card"><div class="card-title mb-8">Personal Records</div>${renderPRList(workouts)}</div>
    `}
  `;
}

function renderPRList(workouts){
  const prs={};
  for(const w of state.workouts){
    for(const ex of w.exercises){
      for(const s of ex.sets){
        if(s.done&&s.weight>0){
          if(!prs[ex.name]||s.weight>prs[ex.name])prs[ex.name]=s.weight;
        }
      }
    }
  }
  const sorted=Object.entries(prs).sort((a,b)=>b[1]-a[1]);
  if(sorted.length===0)return '<div class="text-sm" style="color:var(--text3)">Complete some workouts to see PRs</div>';
  return sorted.slice(0,15).map(([name,w])=>`<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--bg3)"><span class="text-sm">${name}</span><span class="fw-700 text-green">${w} lbs</span></div>`).join('');
}

// ============================================================
// HISTORY TAB
// ============================================================
function renderHistoryTab(){
  const year=state.calYear;
  const month=state.calMonth;
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDow=firstDay.getDay();
  const daysInMonth=lastDay.getDate();
  const today=new Date();
  const todayStr=dayKey(today);
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];

  const workoutDays=new Set();
  state.workouts.forEach(w=>{
    const d=new Date(w.startTime);
    if(d.getMonth()===month&&d.getFullYear()===year)workoutDays.add(d.getDate());
  });

  let calDays='';
  for(let i=0;i<startDow;i++)calDays+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=['cal-day'];
    if(dk===todayStr)cls.push('today');
    if(workoutDays.has(d))cls.push('has-workout');
    if(state.calSelected===dk)cls.push('selected');
    calDays+=`<div class="${cls.join(' ')}" onclick="selectCalDay('${dk}')">${d}</div>`;
  }

  let selectedWorkouts='';
  if(state.calSelected){
    const dayW=state.workouts.filter(w=>dayKey(new Date(w.startTime))===state.calSelected).sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
    if(dayW.length>0){
      selectedWorkouts=dayW.map(w=>`
        <div class="history-workout" onclick="viewWorkout('${w.id}')">
          <div class="flex-between"><span class="hw-name">${w.name}</span><span class="hw-date">${new Date(w.startTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</span></div>
          <div class="hw-stats"><span>${w.exercises.length} exercises</span><span>${calcVolume(w).toLocaleString()} lbs</span>${w.endTime?`<span>${fmtDuration(Math.floor((new Date(w.endTime)-new Date(w.startTime))/1000))}</span>`:''}</div>
        </div>`).join('');
    } else {
      selectedWorkouts='<div class="text-sm text-center" style="color:var(--text3);padding:16px">No workouts on this day</div>';
    }
  }

  const allSorted=[...state.workouts].sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));

  return `
    <div class="flex-between mb-12">
      <button class="header-back" onclick="changeMonth(-1)">${icons.back}</button>
      <span class="fw-700">${monthNames[month]} ${year}</span>
      <button class="header-back" style="transform:rotate(180deg)" onclick="changeMonth(1)">${icons.back}</button>
    </div>
    <div class="calendar">
      ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-header">${d}</div>`).join('')}
      ${calDays}
    </div>
    ${selectedWorkouts}
    ${!state.calSelected?`<div class="card-title mb-8 mt-16">All Workouts</div>${allSorted.length===0?'<div class="empty-state"><p>No workout history yet</p></div>':allSorted.slice(0,20).map(w=>`
      <div class="history-workout" onclick="viewWorkout('${w.id}')">
        <div class="flex-between"><span class="hw-name">${w.name}</span><span class="hw-date">${fmtDate(w.startTime)}</span></div>
        <div class="hw-stats"><span>${w.exercises.length} exercises</span><span>${calcVolume(w).toLocaleString()} lbs</span></div>
      </div>`).join('')}`:''}
  `;
}

              </div>
            </div>
          `:`
            <div>
              <div class="set-row"><div class="set-num">#</div><div class="set-label" style="width:72px">LBS</div><div class="set-label" style="width:72px">REPS</div><div style="width:36px"></div></div>
              ${ex.sets.map((set,si)=>`
                <div class="set-row">
                  <div class="set-num">${si+1}</div>

function setActiveEx(i){state.session.currentExIdx=i;render()}
function removeExFromSession(idx){
  state.session.exercises.splice(idx,1);
  if(state.session.currentExIdx>=state.session.exercises.length)state.session.currentExIdx=Math.max(0,state.session.exercises.length-1);
  render();
}

async function saveCustomExercise(){
  const name=document.getElementById('custom-ex-name').value.trim();
  const body=document.getElementById('custom-ex-body').value;
  const equip=document.getElementById('custom-ex-equip').value;
  const isCardio=document.getElementById('custom-ex-cardio').checked;
  if(!name){alert('Enter a name');return}
  const ex={id:'custom_'+uid(),name,body,equip,isCardio,custom:true};
  customExercises.push(ex);
  await dbPut('exercises',ex);
  state.showCustomExercise=false;
  render();
}

// ============================================================
// CALORIE ESTIMATION
// ============================================================
// MET-based estimates: calories = MET * bodyWeightKg * durationHours
// For lifting: ~3-6 MET depending on intensity. We use set duration estimate.
// For cardio: ~6-12 MET depending on type.
const CARDIO_METS={'Treadmill Run':9.8,'Treadmill Walk (Incline)':6,'Treadmill Sprint Intervals':11,'Assault Bike':10.5,'Assault Bike Intervals':12,'Rowing Machine':7,'Rowing Intervals':9.5,'Stair Climber':9,'Stair Climber (Zone 2)':6.5,'Stationary Bike':7.5,'Stationary Bike Intervals':10,'Elliptical':5.5,'Outdoor Run':9.8,'Outdoor Sprint Intervals':11,'Jump Rope':11,'Battle Ropes':10,'Box Jumps':8,'Burpees':10,'Ski Erg':7.5,'4x4 Cardio on Rower':8.5,'Zone 2 Cardio on Stairs':6.5};
function estimateCalories(exercise,bodyWeightLbs){
  const bwKg=(bodyWeightLbs||180)*0.4536;
  if(exercise.isCardio){
    const met=CARDIO_METS[exercise.name]||7;
    const mins=exercise.durationMin||exercise.sets?.reduce((s,st)=>s+(st.done?2:0),0)*2||10;
    return Math.round(met*bwKg*(mins/60));
  }
  // Strength: ~5 MET, estimate ~40s per set
  const doneSets=exercise.sets?exercise.sets.filter(s=>s.done).length:0;
  const mins=(doneSets*40)/60;
  const met=5;
  return Math.round(met*bwKg*(mins/60));
}

function getSessionCalories(session,bwLbs){
  if(!session)return 0;
  return session.exercises.reduce((sum,ex)=>sum+estimateCalories(ex,bwLbs),0);
}

  render();
  if(state.statsView==='charts'&&state.tab==='stats'&&!state.subPage)setTimeout(renderCharts,50);
}

function switchTab(tab){
  state.tab=tab;state.subPage=null;state.calSelected=null;

}

function startBlankWorkout(){
  state.session={id:uid(),name:'Workout',startTime:new Date().toISOString(),exercises:[],currentExIdx:0};
  state.subPage='active-workout';

}

function showTemplateSelect(){
  if(state.templates.length===0){alert('No templates yet! Create one in the Templates tab.');return}
  const names=state.templates.map((t,i)=>`${i+1}. ${t.name}`).join('\n');
  const choice=prompt('Pick a template:\n'+names);
  if(choice){
    const idx=parseInt(choice)-1;
    if(idx>=0&&idx<state.templates.length)startFromTemplate(state.templates[idx].id);
  }
}

function startFromTemplate(tid){
  const t=state.templates.find(t=>t.id===tid);
  if(!t)return;
  state.session={
    id:uid(),name:t.name,startTime:new Date().toISOString(),
    exercises:t.exercises.map(ex=>({
      exerciseId:ex.exerciseId,name:ex.name,body:ex.body,equip:ex.equip,
      isCardio:ex.isCardio||false,
      durationMin:ex.durationMin||0,
      sets:ex.isCardio?[]:(ex.sets||[]).map(s=>({weight:s.weight||0,reps:s.reps||0,done:false}))
    })),currentExIdx:0
  };
  state.subPage='active-workout';
  render();
}

function pickExercise(exId){
  const ex=getAllExercises().find(e=>e.id===exId);
  if(!ex)return;
  if(state.pickerCallback==='session'){
    if(ex.isCardio){
      state.session.exercises.push({exerciseId:ex.id,name:ex.name,body:ex.body,equip:ex.equip,isCardio:true,durationMin:0,sets:[]});
    }else{
      state.session.exercises.push({exerciseId:ex.id,name:ex.name,body:ex.body,equip:ex.equip,sets:[{weight:0,reps:0,done:false},{weight:0,reps:0,done:false},{weight:0,reps:0,done:false}]});

// Cardio duration
function updateCardioDuration(exIdx,val){
  state.session.exercises[exIdx].durationMin=parseInt(val)||0;
}

function toggleCardioDone(exIdx){
  const ex=state.session.exercises[exIdx];
  ex._cardioDone=!ex._cardioDone;
  if(ex._cardioDone&&exIdx<state.session.exercises.length-1)state.session.currentExIdx=exIdx+1;
  render();
}

function updateSet(exIdx,setIdx,field,value){
  state.session.exercises[exIdx].sets[setIdx][field]=parseFloat(value)||0;
}

function toggleSet(exIdx,setIdx){
  const set=state.session.exercises[exIdx].sets[setIdx];
  set.done=!set.done;
  if(set.done){
    // Auto start rest timer
    // Check if we should auto-advance
    const ex=state.session.exercises[exIdx];
    const allDone=ex.sets.every(s=>s.done);
    if(allDone&&exIdx<state.session.exercises.length-1){
      state.session.currentExIdx=exIdx+1;
    }
  }
  render();
}

function addSetToExercise(exIdx){
  const lastSet=state.session.exercises[exIdx].sets[state.session.exercises[exIdx].sets.length-1];
  state.session.exercises[exIdx].sets.push({weight:lastSet.weight||0,reps:lastSet.reps||0,done:false});
  render();
}

function removeLastSet(exIdx){
  if(state.session.exercises[exIdx].sets.length>1)state.session.exercises[exIdx].sets.pop();
  render();
}


function startRestTimerWith(secs){
  state._selectedRest=secs;
  state.timerSeconds=secs;
  state.timerRunning=true;
  clearInterval(state.timerInterval);
  state.timerInterval=setInterval(()=>{
    if(state.timerSeconds>0){
      state.timerSeconds--;
      // Update floating timer DOM directly instead of full re-render
      const ftEl=document.querySelector('.ft-time');
      if(ftEl)ftEl.textContent=fmtTime(state.timerSeconds);
    }else{
      clearInterval(state.timerInterval);state.timerRunning=false;
      if('vibrate' in navigator)navigator.vibrate([200,100,200]);
      render();
    }
  },1000);
  render();
}

function startRestTimer(){
  startRestTimerWith(state._selectedRest||state.defaultRestTime);
}

function toggleTimer(){
  if(state.timerRunning){
    clearInterval(state.timerInterval);state.timerRunning=false;
  }else{
    state.timerRunning=true;
    state.timerInterval=setInterval(()=>{
      if(state.timerSeconds>0){
        state.timerSeconds--;
        const ftEl=document.querySelector('.ft-time');
        if(ftEl)ftEl.textContent=fmtTime(state.timerSeconds);
      }else{
        clearInterval(state.timerInterval);state.timerRunning=false;
        if('vibrate' in navigator)navigator.vibrate([200,100,200]);
        render();
      }
    },1000);
  }
  render();
}

function resetTimer(){
  clearInterval(state.timerInterval);
  state.timerRunning=false;state.timerSeconds=0;
  render();
}

function confirmEndWorkout(){
  if(confirm('Discard this workout?')){
    clearInterval(state.timerInterval);
    state.session=null;state.subPage=null;state.timerRunning=false;state.timerSeconds=0;
    render();
  }
}

async function finishWorkout(){
  if(!state.session||state.session.exercises.length===0){alert('Add at least one exercise');return}
  const name=prompt('Name this workout:',state.session.name);
  if(name===null)return;
  state.session.name=name||state.session.name;
  state.session.endTime=new Date().toISOString();
  clearInterval(state.timerInterval);
  state.timerRunning=false;state.timerSeconds=0;

  const workout={...state.session};
  state.workouts.push(workout);
  await dbPut('workouts',workout);

  state.session=null;state.subPage=null;
  render();
}

// Export/Import
function exportData(){
  const data={workouts:state.workouts,templates:state.templates,bodyweights:state.bodyweights,settings:{defaultRestTime:state.defaultRestTime}};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='liftinstuff-backup.json';a.click();
  URL.revokeObjectURL(url);
}

async function importData(e){
  const file=e.target.files[0];if(!file)return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(data.workouts){state.workouts=data.workouts;for(const w of data.workouts)await dbPut('workouts',w)}
    if(data.templates){state.templates=data.templates;for(const t of data.templates)await dbPut('templates',t)}
    if(data.bodyweights){state.bodyweights=data.bodyweights;for(const b of data.bodyweights)await dbPut('bodyweight',b)}
    if(data.settings?.defaultRestTime){state.defaultRestTime=data.settings.defaultRestTime;await dbPut('settings',{key:'defaultRestTime',value:data.settings.defaultRestTime})}
    alert('Data imported successfully!');render();
  }catch(err){alert('Error importing data: '+err.message)}
}

function renderCharts(){
  renderBPChart();
  renderVolChart();
  renderBWChart();
}

function renderBPChart(){
  const canvas=document.getElementById('chart-bp');
  if(!canvas)return;
  let workouts=state.workouts;
  const now=new Date();
  if(state.statsRange==='week')workouts=workouts.filter(w=>new Date(w.startTime)>=weekStart);
  else if(state.statsRange==='month')workouts=workouts.filter(w=>{const d=new Date(w.startTime);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});

  const bpSets=getSetsPerBodyPart(workouts);
  const labels=BODY_PARTS.filter(bp=>bpSets[bp]>0);
  const data=labels.map(bp=>bpSets[bp]);

  new Chart(canvas,{type:'bar',data:{labels,datasets:[{data,backgroundColor:'#2d6a4f',borderColor:'#40916c',borderWidth:1,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#a0a0a0',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#a0a0a0'},grid:{color:'#1a241a'},beginAtZero:true}}}});
}

function renderVolChart(){
  const canvas=document.getElementById('chart-vol');
  if(!canvas)return;
  const sorted=[...state.workouts].sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  let filtered=sorted;
  const now=new Date();
  if(state.statsRange==='week')filtered=sorted.filter(w=>new Date(w.startTime)>=weekStart);
  else if(state.statsRange==='month')filtered=sorted.filter(w=>{const d=new Date(w.startTime);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});

  const labels=filtered.map(w=>fmtDate(w.startTime));
  const data=filtered.map(w=>calcVolume(w));

  new Chart(canvas,{type:'line',data:{labels,datasets:[{data,borderColor:'#52b788',backgroundColor:'rgba(82,183,136,0.1)',fill:true,tension:.3,pointBackgroundColor:'#52b788',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#a0a0a0',font:{size:10},maxRotation:45},grid:{display:false}},y:{ticks:{color:'#a0a0a0'},grid:{color:'#1a241a'},beginAtZero:true}}}});
}

function renderBWChart(){
  const canvas=document.getElementById('chart-bw');
  if(!canvas)return;
  const sorted=[...state.bodyweights].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(sorted.length<2)return;

  new Chart(canvas,{type:'line',data:{labels:sorted.map(b=>fmtDate(b.date)),datasets:[{data:sorted.map(b=>b.weight),borderColor:'#52b788',backgroundColor:'rgba(82,183,136,0.1)',fill:true,tension:.3,pointBackgroundColor:'#52b788',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#a0a0a0',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#a0a0a0'},grid:{color:'#1a241a'}}}}});
}

// ============================================================
// EVENT BINDING
// ============================================================
function attachEvents(){
  // Duration counter for active workout - updates DOM directly, no re-render
  if(state.subPage==='active-workout'&&state.session){
    clearInterval(window._durInterval);
    window._durInterval=setInterval(()=>{
      const durEl=document.getElementById('workout-dur');
      if(durEl&&state.session){
        const dur=Math.floor((Date.now()-new Date(state.session.startTime).getTime())/1000);
        durEl.textContent=fmtDuration(dur);
      }
    },1000);
    // Request wake lock to prevent screen dimming
    requestWakeLock();
  }else{
    clearInterval(window._durInterval);
    releaseWakeLock();
  }
}

// ============================================================
// WAKE LOCK (prevent screen dimming during workout)
// ============================================================
let wakeLock=null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{wakeLock=null});
    }
  }catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){try{wakeLock.release()}catch(e){}}
  wakeLock=null;
}
// Re-request wake lock when page becomes visible again
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&state.subPage==='active-workout')requestWakeLock();
});

  if(restSetting)state.defaultRestTime=restSetting.value;

  // Seed default templates on first launch

  if(!seeded&&state.templates.length===0){

}
